<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web evolution · agentic frontier</title>
    <!-- professional clean design, colour-coded navbar & pages, based on Web2-2.pptx.pdf content -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'system-ui', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8fafc;
            color: #1a2b3e;
            line-height: 1.5;
            transition: background-color 0.2s;
        }

        /* ----- navigation – each page gives navbar a distinct accent (class toggled by js) ----- */
        .navbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1.5rem;
            padding: 0.9rem 3rem;
            background: #13293D; /* base (home) */
            border-bottom: 4px solid #306B34;
            box-shadow: 0 6px 12px rgba(0,20,10,0.08);
            transition: background 0.2s, border-color 0.2s;
        }

        /* nav brand / subtle */
        .nav-brand {
            font-weight: 600;
            font-size: 1.4rem;
            margin-right: 1.2rem;
            color: #ffffffcc;
            letter-spacing: -0.02em;
            border-right: 2px solid #ffffff40;
            padding-right: 1.8rem;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            background: rgba(255,255,255,0.08);
            transition: all 0.2s ease;
            border: 1px solid transparent;
            backdrop-filter: blur(4px);
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .nav-active {
            background: #FFFFFF;
            color: #0a3144;
            font-weight: 600;
            border: 1px solid #c7dff7;
            box-shadow: 0 4px 0 #0f5132;
        }

        /* page container – background colour defines which page we're on */
        .page-wrapper {
            max-width: 1280px;
            margin: 2.5rem auto;
            padding: 0 2.5rem 3rem 2.5rem;
            border-radius: 48px 12px 48px 12px;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 25px 40px -18px rgba(0,40,20,0.3);
        }

        /* background colours for each page (professional pastels with purpose) */
        .page-home { background: #F8F9FA; }        /* clean white */
        .page-about { background: #E6F0FA; }       /* light sky — intelligence */
        .page-web1 { background: #F3E6D9; }        /* warm sandstone — retro */
        .page-web2 { background: #DAEDE2; }        /* soft mint — growth */
        .page-web3 { background: #E3DAF1; }        /* gentle lavender — future */

        /* content elements */
        h1 {
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0e2b3d;
            border-left: 8px solid #2D6A4F;
            padding-left: 1.5rem;
            margin: 1.2rem 0 1.8rem 0;
        }

        h2 {
            font-size: 2rem;
            font-weight: 500;
            margin: 2.2rem 0 1.2rem 0;
            color: #1A3F4A;
            border-bottom: 2px solid rgba(45,106,79,0.25);
            padding-bottom: 0.4rem;
        }

        h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1B5E3F;
            margin: 1.8rem 0 1rem;
        }

        p {
            font-size: 1.16rem;
            margin-bottom: 1.2rem;
            color: #1f3849;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0 1.5rem;
        }

        .insight-card {
            background: white;
            padding: 1.8rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 8px 18px -6px rgba(0,32,16,0.15);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .insight-card strong {
            font-size: 1.3rem;
            color: #0F4C3A;
            display: block;
            margin-bottom: 0.75rem;
        }

        .image-placeholder {
            background: #ffffffc0;
            border: 2px dashed #3A6B4F;
            border-radius: 28px;
            padding: 2rem 2rem;
            margin: 2rem 0;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 400;
            color: #274936;
            box-shadow: inset 0 0 0 2px #f9f9f9;
        }

        .image-placeholder span {
            background: #1A3F44;
            color: white;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 1rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .semantic-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(3px);
            padding: 2rem;
            border-radius: 40px;
            margin: 2.5rem 0;
            align-items: center;
        }

        .ref-links {
            list-style: none;
            background: #1E2F40;
            padding: 2rem;
            border-radius: 32px;
            color: white;
        }

        .ref-links li {
            font-size: 1.2rem;
            margin: 1rem 0;
            border-bottom: 1px dotted #8da9b3;
            padding-bottom: 0.5rem;
        }

        .ref-links a {
            color: #FFD966;
            text-decoration: none;
            font-weight: 500;
        }

        .ref-links a:hover {
            text-decoration: underline;
        }

        /* footer */
        .footer-note {
            margin-top: 3.5rem;
            font-size: 0.95rem;
            color: #2D5146;
            border-top: 1px solid #AEC3B0;
            padding-top: 1.2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        /* navbar background variants (matching page) – applied to body class */
        body.home-nav .navbar { background: #13293D; border-bottom-color: #306B34; }
        body.about-nav .navbar { background: #14455B; border-bottom-color: #527BAE; }
        body.web1-nav .navbar { background: #7E5C40; border-bottom-color: #B47C5E; }
        body.web2-nav .navbar { background: #1F6045; border-bottom-color: #79B791; }
        body.web3-nav .navbar { background: #4C3B63; border-bottom-color: #9D85B2; }

        /* small adjustments */
        @media (max-width: 700px) {
            .navbar { padding: 0.8rem 1.5rem; }
            .page-wrapper { padding: 0 1.5rem 2rem 1.5rem; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body id="theme-body" class="home-nav">
    <!-- navigation (five distinct items) -->
    <nav class="navbar">
        <span class="nav-brand">🌐 web•gen</span>
        <a href="#" data-page="home" class="nav-item nav-active" id="nav-home">Home</a>
        <a href="#" data-page="about" class="nav-item" id="nav-about">About</a>
        <a href="#" data-page="web1" class="nav-item" id="nav-web1">Web 1.0</a>
        <a href="#" data-page="web2" class="nav-item" id="nav-web2">Web 2.0</a>
        <a href="#" data-page="web3" class="nav-item" id="nav-web3">Web 3.0</a>
    </nav>

    <!-- main content wrapper (background colour changes per page) -->
    <main class="page-wrapper" id="contentWrapper">
        <!-- filled dynamically via JavaScript based on selection -->
    </main>

    <script>
        (function() {
            const body = document.getElementById('theme-body');
            const wrapper = document.getElementById('contentWrapper');
            const navHome = document.getElementById('nav-home');
            const navAbout = document.getElementById('nav-about');
            const navWeb1 = document.getElementById('nav-web1');
            const navWeb2 = document.getElementById('nav-web2');
            const navWeb3 = document.getElementById('nav-web3');

            const navItems = { home: navHome, about: navAbout, web1: navWeb1, web2: navWeb2, web3: navWeb3 };

            function removeActiveClass() {
                Object.values(navItems).forEach(el => el.classList.remove('nav-active'));
            }

            function setBodyClass(page) {
                body.classList.remove('home-nav', 'about-nav', 'web1-nav', 'web2-nav', 'web3-nav');
                body.classList.add(page + '-nav');
            }

            // ---- page render functions using content from Web2-2.pptx.pdf ----
            function renderHome() {
                wrapper.className = 'page-wrapper page-home';
                wrapper.innerHTML = `
                    <h1>The evolution of the web</h1>
                    <div class="image-placeholder">
                        <span>📜 timeline</span>
                        <div style="font-size:2.8rem;">Web 1.0 → 2.0 → 3.0 → Agentic</div>
                    </div>
                    <div class="card-grid">
                        <div class="insight-card"><strong>Web 1.0</strong> read-only, static, portals (Yahoo!)</div>
                        <div class="insight-card"><strong>Web 2.0</strong> read-write, social, cloud</div>
                        <div class="insight-card"><strong>Web 3.0</strong> decentralized, blockchain, semantic</div>
                        <div class="insight-card"><strong>Agentic Web</strong> AI agents, autonomous transactions</div>
                    </div>
                    <h2>from “click and wait” to “ask and it’s done”</h2>
                    <p>Based on the Web2-2 deck: Web3 + agentic AI automate the entire lifecycle. This exhibit breaks down each era — use the colour‑coded navbar.</p>
                    <div class="footer-note">
                        <span>📄 source: Web2-2.pptx.pdf · page 1–5</span>
                        <span>⚡ future: agentic commerce</span>
                    </div>
                `;
            }

            function renderAbout() {
                wrapper.className = 'page-wrapper page-about';
                wrapper.innerHTML = `
                    <h1>About · semantic & decentralized vision</h1>
                    <div class="semantic-row">
                        <div style="flex:2;">
                            <p><strong>Web3 is a new decentralized internet, built on blockchain technology, communally controlled by its users.</strong> Instead of data stored on corporate servers, blockchain operates as a distributed database across many computers — enabling security, transparency and trust without intermediaries.</p>
                        </div>
                        <div style="flex:1; background: #fff; border-radius: 32px; padding: 1.2rem; text-align:center;">
                            🔗 blockchain · transparency
                        </div>
                    </div>
                    <h2>🧠 Semantic web & AI</h2>
                    <p>From the PDF: <em>“Semantic web provides structured, machine-readable framework for data. This allows machines to interpret context and connections. AI uses structured semantic data to improve reasoning and decision making.”</em></p>
                    <div class="image-placeholder">
                        <span>example</span> Semantic web + AI → enhanced search (complex queries, personalized results)
                    </div>
                    <p>Page 3 of the deck explains how this evolution makes the internet “speak our language”.</p>
                    <h3>📌 why it matters</h3>
                    <p>Agentic web (future) builds on these layers: from understanding needs to completing transactions with minimal human intervention.</p>
                    <div class="footer-note">about page · colour: powder blue</div>
                `;
            }

            function renderWeb1() {
                wrapper.className = 'page-wrapper page-web1';
                wrapper.innerHTML = `
                    <h1>Web 1.0 · 1990s – 2000</h1>
                    <p><strong>Static · read-only · early portals.</strong> The original “yahoo!” era. Pages were mostly informational, guestbooks, under construction GIFs.</p>
                    <div class="image-placeholder" style="background: #eddac6;">
                        <span>🧩 yahoo! directory</span>
                        <div style="font-size:3rem; font-weight:300;">YAHOO!</div>
                    </div>
                    <div class="card-grid">
                        <div class="insight-card">🏷️ HTML 1.0 / 2.0</div>
                        <div class="insight-card">📨 dial-up · webrings</div>
                        <div class="insight-card">📂 no user interaction</div>
                    </div>
                    <p>Web 1.0 laid the foundation: hyperlinks, email, and early e‑commerce. No social platforms, just browsing.</p>
                `;
            }

            function renderWeb2() {
                wrapper.className = 'page-wrapper page-web2';
                wrapper.innerHTML = `
                    <h1>Web 2.0 · 2000s – 2020s</h1>
                    <p><strong>Read-write · social · cloud.</strong> User generated content, wikis, blogs, and platforms (Facebook, YouTube, Wikipedia).</p>
                    <div class="semantic-row" style="background: #cbe5d9;">
                        <div>📱 interactivity</div>
                        <div>☁️ SaaS</div>
                        <div>📊 big data begins</div>
                    </div>
                    <h3>key characteristics</h3>
                    <div class="card-grid">
                        <div class="insight-card"><strong>social media</strong> like/share/comment</div>
                        <div class="insight-card"><strong>APIs & mashups</strong> programmable web</div>
                        <div class="insight-card"><strong>participatory culture</strong> read-write web</div>
                    </div>
                    <p>The phrase “Web 2.0” emerged around 2004, emphasizing the web as a platform.</p>
                `;
            }

            function renderWeb3() {
                wrapper.className = 'page-wrapper page-web3';
                wrapper.innerHTML = `
                    <h1>Web 3.0 · 2020s onwards</h1>
                    <p><strong>Decentralized · blockchain · semantic + agentic AI</strong> — communal control, trustless transactions.</p>
                    <div class="image-placeholder">
                        <span>📘 blockchain definition (PDF page 2)</span>
                        <p style="font-size:1.2rem;"><em>“Blockchain operates as a decentralized distributed database, with data stored across multiple computers. It provides security, transparency and trust without intermediaries.”</em></p>
                    </div>
                    <h2>🤖 Agentic future & the semantic layer</h2>
                    <div class="semantic-row">
                        <p style="flex:2;"><strong>Semantic web + AI</strong> — machines understand context. The deck mentions search accuracy, personalized experience, and decision-making.</p>
                        <p style="flex:1; background:white; padding:1rem; border-radius:32px;">example: “buy it in ChatGPT”</p>
                    </div>

                    <h3>📎 references from PDF page 5</h3>
                    <ul class="ref-links">
                        <li>1. Buy it in ChatGPT: Instant Checkout and the Agentic Commerce ...</li>
                        <li>2. <a href="#">https://vt.tiktok.com/ZSfutMCkV/</a> (demo link)</li>
                        <li>3. AI Video Generator: Turn Images into Stunning Videos | Artist</li>
                        <li>4. AI-powered agents are the future of computing | Bill Gates</li>
                    </ul>

                    <h2>⚡ The future: Agentic Web</h2>
                    <p>From “click and wait” to “ask and it’s done”. AI agents automate shopping, bookings, and complex workflows with minimal human intervention — highly personalized, efficient, and trustworthy. (Page 4 of the deck)</p>
                    <div class="footer-note">web3 page · lavender · agentic horizon</div>
                `;
            }

            // set active page and content
            function navigateTo(page) {
                removeActiveClass();
                navItems[page].classList.add('nav-active');
                setBodyClass(page);

                switch(page) {
                    case 'home': renderHome(); break;
                    case 'about': renderAbout(); break;
                    case 'web1': renderWeb1(); break;
                    case 'web2': renderWeb2(); break;
                    case 'web3': renderWeb3(); break;
                    default: renderHome();
                }
            }

            // attach click listeners
            navHome.addEventListener('click', (e) => { e.preventDefault(); navigateTo('home'); });
            navAbout.addEventListener('click', (e) => { e.preventDefault(); navigateTo('about'); });
            navWeb1.addEventListener('click', (e) => { e.preventDefault(); navigateTo('web1'); });
            navWeb2.addEventListener('click', (e) => { e.preventDefault(); navigateTo('web2'); });
            navWeb3.addEventListener('click', (e) => { e.preventDefault(); navigateTo('web3'); });

            // initial render (home)
            renderHome();
        })();
    </script>
</body>
</html>
